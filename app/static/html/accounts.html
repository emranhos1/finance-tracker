<div class="page-header">
  <h1>Accounts</h1>
  <button class="btn btn-primary" id="addAccountBtn">+ Add Account</button>
</div>

<div id="accountAlert"></div>

<div class="card">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Type</th>
          <th>Account No.</th>
          <th>Balance</th>
          <th>Start Date</th>
          <th>Maturity Date</th>
          <th>Installment</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="accountsBody">
        <tr><td colspan="6" class="loading">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Add / Edit Account Modal Template -->
<template id="tplAccountModal">
  <div class="modal" style="max-width:480px">
    <h2 id="modalTitle"></h2>
    <div id="modalAlert"></div>
    <div class="form-group">
      <label>Account Name</label>
      <input type="text" id="accName" placeholder="e.g. BRAC Bank Savings">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Type</label>
        <select id="accType">
          <option value="cash">Cash</option>
          <option value="bank">Bank</option>
          <option value="dps">DPS</option>
          <option value="fdr">FDR</option>
          <option value="plot">Plot</option>
        </select>
      </div>
      <div class="form-group">
        <label>Balance (৳)</label>
        <input type="number" id="accBalance" placeholder="0.00" step="0.01" value="0">
      </div>
    </div>
    <div class="form-group" id="accountNumberGroup" style="display:none">
      <label>Account Number</label>
      <input type="text" id="accNumber" placeholder="e.g. 1234567890">
    </div>
    <div id="dpsFields" style="display:none">
      <div class="form-group" id="startingDateGroup">
        <label>Starting Date</label>
        <input type="date" id="accStarting">
      </div>
      <div class="form-group" id="maturityDateGroup">
        <label>Maturity Date</label>
        <input type="date" id="accMaturity">
      </div>
      <div class="form-group" id="installmentGroup">
        <label>Monthly Installment (৳)</label>
        <input type="number" id="accInstallment" placeholder="0.00" step="0.01">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="cancelModal">Cancel</button>
      <button class="btn btn-primary" id="saveAccount">Save</button>
    </div>
  </div>
</template>

<!-- Delete Confirm Modal Template -->
<template id="tplDeleteModal">
  <div class="modal" style="max-width:360px;text-align:center">
    <div style="font-size:3rem;margin-bottom:0.75rem">🗑️</div>
    <h2 style="margin-bottom:0.5rem">Delete Account?</h2>
    <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:1.5rem">
      You are about to delete<br>
      <strong id="deleteAccountName" style="color:var(--text)"></strong><br>
      <span style="color:var(--danger)">This action cannot be undone.</span>
    </p>
    <div id="delAlert"></div>
    <div style="display:flex;gap:0.75rem;justify-content:center">
      <button class="btn btn-outline" id="cancelDel" style="min-width:110px">Cancel</button>
      <button class="btn btn-danger" id="confirmDel" style="min-width:110px">Yes, Delete</button>
    </div>
  </div>
</template>

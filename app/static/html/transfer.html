<div class="page-header">
  <h1>Internal Transfer</h1>
</div>

<div id="transferAlert"></div>

<div class="grid-2">
  <div class="card">
    <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:1.25rem">
      Transfers are atomic double-entry: the source account is debited and
      the destination credited simultaneously.
    </p>

    <div class="form-group">
      <label>Date</label>
      <input type="date" id="trDate">
    </div>

    <div class="form-group">
      <label>From Account</label>
      <select id="trFrom">
        <option value="">— Select source —</option>
      </select>
    </div>

    <div class="form-group">
      <label>To Account</label>
      <select id="trTo">
        <option value="">— Select destination —</option>
      </select>
    </div>

    <div class="form-group">
      <label>Amount (৳)</label>
      <input type="number" id="trAmount" placeholder="0.00" step="0.01" min="0.01">
    </div>

    <div class="form-group">
      <label>Note (optional)</label>
      <input type="text" id="trNote" placeholder="e.g. DPS installment for June">
    </div>

    <button class="btn btn-primary" id="saveTransfer" style="width:100%">🔄 Execute Transfer</button>
  </div>

  <div class="card">
    <div class="section-title">Recent Transfers</div>
    <div id="recentTransfers"><div class="loading">Loading...</div></div>
  </div>
</div>

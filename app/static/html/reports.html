<div class="page-header">
  <h1>Reports</h1>
</div>

<div class="card" style="margin-bottom:1.5rem">
  <div class="filter-bar">
    <div class="form-group">
      <label>Period</label>
      <select id="rPeriod">
        <option value="daily">Daily (within month)</option>
        <option value="monthly" selected>Monthly (within year)</option>
        <option value="yearly">Yearly (all time)</option>
      </select>
    </div>
    <div class="form-group" id="yearGroup">
      <label>Year</label>
      <select id="rYear"></select>
    </div>
    <div class="form-group" id="monthGroup" style="display:none">
      <label>Month</label>
      <select id="rMonth">
        <option value="1">January</option>
        <option value="2">February</option>
        <option value="3">March</option>
        <option value="4">April</option>
        <option value="5">May</option>
        <option value="6">June</option>
        <option value="7">July</option>
        <option value="8">August</option>
        <option value="9">September</option>
        <option value="10">October</option>
        <option value="11">November</option>
        <option value="12">December</option>
      </select>
    </div>
    <div class="form-group">
      <label>Account</label>
      <select id="rAccount">
        <option value="">All Accounts</option>
      </select>
    </div>
    <div class="form-group">
      <label>&nbsp;</label>
      <button class="btn btn-primary" id="runReport">Generate Report</button>
    </div>
  </div>
</div>

<div id="reportResults"></div>

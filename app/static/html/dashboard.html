<div class="page-header">
  <h1>Dashboard</h1>
  <span id="dashDate" style="color:var(--text-muted);font-size:0.8rem"></span>
</div>

<div style="margin-bottom:1rem">
  <div class="card net-worth-card">
    <div class="card-title">💎 Total Net Worth</div>
    <div class="card-value" id="netWorth">—</div>
  </div>
</div>

<div class="grid-3" style="margin-bottom:1.5rem">
  <div class="card">
    <div class="card-title">Today</div>
    <div id="todayStats"></div>
  </div>
  <div class="card">
    <div class="card-title">This Month</div>
    <div id="monthStats"></div>
  </div>
  <div class="card">
    <div class="card-title">This Year</div>
    <div id="yearStats"></div>
  </div>
</div>

<div class="grid-2">
  <div class="card">
    <div class="section-title">Account Balances</div>
    <div id="accountBalances"></div>
  </div>
  <div class="card">
    <div class="section-title">Monthly Expense by Category</div>
    <div id="categoryBreakdown"></div>
  </div>
</div>

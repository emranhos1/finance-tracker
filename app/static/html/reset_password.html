<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Manager — Reset Password</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: #fff; border: 1px solid #d1d5db; border-radius: 12px;
    padding: 2.5rem; width: 100%; max-width: 380px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .logo { text-align: center; margin-bottom: 2rem; }
  .logo h1 { color: #111827; font-size: 1.4rem; font-weight: 700; }
  .logo p  { color: #6b7280; font-size: 0.875rem; margin-top: 0.25rem; }
  label {
    display: block; color: #6b7280; font-size: 0.75rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem;
  }
  input {
    width: 100%; background: #f9fafb; border: 1px solid #d1d5db;
    border-radius: 6px; color: #111827; font-size: 0.95rem;
    padding: 0.65rem 0.85rem; margin-bottom: 1.2rem; outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); background: #fff; }
  button {
    width: 100%; background: #4f46e5; border: none; border-radius: 6px;
    color: #fff; cursor: pointer; font-size: 0.95rem; font-weight: 600;
    padding: 0.75rem; transition: background 0.2s;
  }
  button:hover { background: #4338ca; }
  button:disabled { opacity: 0.7; cursor: not-allowed; }
  .msg {
    font-size: 0.85rem; text-align: center; border-radius: 6px;
    padding: 0.6rem; margin-top: 0.75rem; display: none;
  }
  .msg.error   { display: block; background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; }
  .msg.success { display: block; background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; }
  .invalid { text-align: center; color: #b91c1c; padding: 1rem; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>💰 Finance Manager</h1>
    <p>Set new password</p>
  </div>
  <div id="formSection">
    <label for="newPass">New Password</label>
    <input type="password" id="newPass" placeholder="Min. 6 characters">
    <label for="confirmPass">Confirm Password</label>
    <input type="password" id="confirmPass" placeholder="••••••••">
    <button id="submitBtn">Set New Password</button>
    <div class="msg" id="msg"></div>
  </div>
</div>
<script>
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) {
    document.getElementById('formSection').innerHTML =
      '<div class="invalid">❌ Invalid or missing reset token.<br><a href="/">Go to Login</a></div>';
  }

  async function submit() {
    const newPass     = document.getElementById('newPass').value;
    const confirmPass = document.getElementById('confirmPass').value;
    const msgEl       = document.getElementById('msg');
    msgEl.className   = 'msg';

    if (!newPass || !confirmPass) {
      msgEl.textContent = 'Both fields are required'; msgEl.classList.add('error'); return;
    }
    if (newPass !== confirmPass) {
      msgEl.textContent = 'Passwords do not match'; msgEl.classList.add('error'); return;
    }
    if (newPass.length < 6) {
      msgEl.textContent = 'Minimum 6 characters'; msgEl.classList.add('error'); return;
    }

    const btn = document.getElementById('submitBtn');
    btn.textContent = 'Saving...'; btn.disabled = true;

    try {
      const res  = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, new_password: newPass })
      });
      const data = await res.json();
      if (!res.ok) {
        msgEl.textContent = data.detail; msgEl.classList.add('error');
      } else {
        msgEl.textContent = '✅ ' + data.message; msgEl.classList.add('success');
        setTimeout(() => window.location.href = '/', 2500);
      }
    } catch(e) {
      msgEl.textContent = 'Connection error'; msgEl.classList.add('error');
    } finally {
      btn.textContent = 'Set New Password'; btn.disabled = false;
    }
  }

  document.getElementById('submitBtn')?.addEventListener('click', submit);
  document.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
</script>
</body>
</html>

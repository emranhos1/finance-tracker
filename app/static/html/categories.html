<div class="page-header">
  <h1>Categories</h1>
  <button class="btn btn-primary" id="addCatBtn">+ Add Category</button>
</div>

<div id="catAlert"></div>

<div class="grid-3">
  <div class="card">
    <div class="section-title" style="color:var(--income)">▲ Income</div>
    <table>
      <thead><tr><th>Name</th><th>Actions</th></tr></thead>
      <tbody id="incomeBody">
        <tr><td colspan="2" class="loading">Loading...</td></tr>
      </tbody>
    </table>
  </div>
  <div class="card">
    <div class="section-title" style="color:var(--expense)">▼ Expense</div>
    <table>
      <thead><tr><th>Name</th><th>Actions</th></tr></thead>
      <tbody id="expenseBody">
        <tr><td colspan="2" class="loading">Loading...</td></tr>
      </tbody>
    </table>
  </div>
  <div class="card">
    <div class="section-title" style="color:var(--primary)">↕ Both</div>
    <table>
      <thead><tr><th>Name</th><th>Actions</th></tr></thead>
      <tbody id="bothBody">
        <tr><td colspan="2" class="loading">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Category Modal Template -->
<template id="tplCatModal">
  <div class="modal" style="max-width:400px">
    <h2 id="catModalTitle"></h2>
    <div id="catModalAlert"></div>
    <div class="form-group">
      <label>Category Name</label>
      <input type="text" id="catName" placeholder="e.g. Electricity Bill">
    </div>
    <div class="form-group">
      <label>Type</label>
      <div style="display:flex;gap:1.5rem;margin-top:0.35rem">
        <label style="display:flex;align-items:center;gap:0.4rem;text-transform:none;font-size:0.9rem;font-weight:500;cursor:pointer">
          <input type="radio" name="catType" value="income">
          <span style="color:var(--income);font-weight:600">▲ Income</span>
        </label>
        <label style="display:flex;align-items:center;gap:0.4rem;text-transform:none;font-size:0.9rem;font-weight:500;cursor:pointer">
          <input type="radio" name="catType" value="expense">
          <span style="color:var(--expense);font-weight:600">▼ Expense</span>
        </label>
        <label style="display:flex;align-items:center;gap:0.4rem;text-transform:none;font-size:0.9rem;font-weight:500;cursor:pointer">
          <input type="radio" name="catType" value="both">
          <span style="color:var(--primary);font-weight:600">↕ Both</span>
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="cancelCat">Cancel</button>
      <button class="btn btn-primary" id="saveCat">Save</button>
    </div>
  </div>
</template>

<!-- Delete Confirm Modal Template -->
<template id="tplCatDeleteModal">
  <div class="modal" style="max-width:360px;text-align:center">
    <div style="font-size:3rem;margin-bottom:0.75rem">🗑️</div>
    <h2 style="margin-bottom:0.5rem">Delete Category?</h2>
    <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:1.5rem">
      You are about to delete<br>
      <strong id="deleteCatName" style="color:var(--text)"></strong><br>
      <span style="color:var(--danger)">Transactions using this will be unlinked.</span>
    </p>
    <div id="delCatAlert"></div>
    <div style="display:flex;gap:0.75rem;justify-content:center">
      <button class="btn btn-outline" id="cancelDelCat" style="min-width:110px">Cancel</button>
      <button class="btn btn-danger" id="confirmDelCat" style="min-width:110px">Yes, Delete</button>
    </div>
  </div>
</template>

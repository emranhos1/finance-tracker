<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Manager — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-card {
    background: #ffffff;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    padding: 2.5rem;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .logo { text-align: center; margin-bottom: 2rem; }
  .logo h1 { color: #111827; font-size: 1.5rem; font-weight: 700; }
  .logo p { color: #6b7280; font-size: 0.875rem; margin-top: 0.25rem; }
  label {
    display: block; color: #6b7280; font-size: 0.75rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem;
  }
  input {
    width: 100%; background: #f9fafb; border: 1px solid #d1d5db;
    border-radius: 6px; color: #111827; font-size: 0.95rem;
    padding: 0.65rem 0.85rem; margin-bottom: 1.2rem; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); background: #fff; }
  button {
    width: 100%; background: #4f46e5; border: none; border-radius: 6px;
    color: #fff; cursor: pointer; font-size: 0.95rem; font-weight: 600;
    padding: 0.75rem; transition: background 0.2s;
  }
  button:hover { background: #4338ca; }
  button:disabled { opacity: 0.7; cursor: not-allowed; }
  .error {
    color: #b91c1c; font-size: 0.85rem; text-align: center;
    margin-top: 0.75rem; min-height: 1.2rem;
    background: #fef2f2; border: 1px solid #fecaca;
    border-radius: 6px; padding: 0.5rem;
    display: none;
  }
  .error.show { display: block; }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <h1>💰 Finance Manager</h1>
    <p>Daily Finance Management System</p>
  </div>
  <label for="username">Username</label>
  <input type="text" id="username" placeholder="admin" autocomplete="username">
  <label for="password">Password</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  <button id="loginBtn">Sign In</button>
  <div class="error" id="errorMsg"></div>
</div>
<script>
  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('errorMsg');
    errorEl.classList.remove('show');
    if (!username || !password) {
      errorEl.textContent = 'Enter username and password';
      errorEl.classList.add('show');
      return;
    }
    const btn = document.getElementById('loginBtn');
    btn.textContent = 'Signing in...'; btn.disabled = true;
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
      });
      const data = await res.json();
      if (!res.ok) {
        errorEl.textContent = data.detail || 'Login failed';
        errorEl.classList.add('show');
        return;
      }
      localStorage.setItem('token', data.access_token);
      window.location.href = '/app';
    } catch(e) {
      errorEl.textContent = 'Connection error — is the server running?';
      errorEl.classList.add('show');
    } finally {
      btn.textContent = 'Sign In'; btn.disabled = false;
    }
  }
  document.getElementById('loginBtn').addEventListener('click', login);
  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
